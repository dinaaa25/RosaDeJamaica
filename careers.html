<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers — Rosa de Jamaica</title>
    <link rel=" stylesheet" href="careersStyle.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
</head>

<body>
    <section class="careers-hero">
        <div class="careers-overlay">
            <h1 class="about-title">Join the Rosa Family</h1>
            <p>Help us share the authentic taste of hibiscus with the world.</p>
        </div>
    </section>

    <div id="careers-container"></div>

    <script>
        async function loadCareers() {
            const { data: jobs, error } = await supabaseClient
                .from('careers')
                .select('*')
                .eq('is_active', true)
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Failed to load careers:', error);
                return;
            }

            const container = document.getElementById('careers-container');
            if (!container || !jobs.length) return;

            container.innerHTML = jobs.map(job => {
                const responsibilities = (job.responsibilities || [])
                    .map(r => `<li>${r}</li>`)
                    .join('');

                return `
                <section class="job-detail-section">
                    <div class="job-container">
                        <div class="job-header">
                            <span class="job-tag">${job.job_type}</span>
                            <h2>${job.title}</h2>
                            <p class="job-location">${job.location}</p>
                        </div>
                        <div class="job-description">
                            <h3>The Role</h3>
                            <p>${job.role_description}</p>
                            <h3>What You'll Do</h3>
                            <ul>${responsibilities}</ul>
                            <button class="buyButton" style="position: relative; top: 0; right: 0; margin-top: 30px;">
                                Apply for this Role
                            </button>
                        </div>
                    </div>
                </section>`;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', loadCareers);
    </script>
</body>

</html>
